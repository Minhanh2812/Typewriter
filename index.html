<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typewriter Multi-Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="typewriter-container">
        <div id="paper-wrapper">
            <div id="paper" contenteditable="true" spellcheck="false" autofocus></div>
        </div>

        <div class="keyboard">
            <div id="keyboard-content"></div>
            
            <div class="row">
                <div class="key special" id="btn-toggle">123</div>
                <div class="key special" id="btn-caps">CAPS</div>
                <div class="key space">SPACE</div>
                <div class="key enter">RETURN</div>
                <div class="key special" id="btn-save">SAVE</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
